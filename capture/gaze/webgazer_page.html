<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ContextNotes — Gaze Calibration</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #111; color: #eee; overflow: hidden; height: 100vh; }

    #status-bar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 8px 16px; background: rgba(0,0,0,0.8);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; z-index: 1000;
    }
    #status-bar .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot-red { background: #f44; }
    .dot-green { background: #4f4; }
    .dot-yellow { background: #ff4; }

    #calibration-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #calibration-overlay h2 { margin-bottom: 16px; font-weight: 400; }
    #calibration-overlay p { color: #aaa; margin-bottom: 24px; max-width: 400px; text-align: center; }

    .cal-point {
      position: absolute; width: 20px; height: 20px;
      background: rgba(100, 149, 237, 0.8); border: 2px solid #6495ed;
      border-radius: 50%; cursor: pointer; transition: transform 0.2s;
    }
    .cal-point:hover { transform: scale(1.4); }
    .cal-point.done { background: rgba(100, 200, 100, 0.8); border-color: #6c6; pointer-events: none; }

    #gaze-dot {
      position: fixed; width: 16px; height: 16px;
      background: rgba(255, 100, 100, 0.6); border-radius: 50%;
      pointer-events: none; z-index: 50;
      transform: translate(-50%, -50%);
      transition: left 0.05s, top 0.05s;
      display: none;
    }

    #info-panel {
      position: fixed; bottom: 16px; right: 16px;
      background: rgba(0,0,0,0.7); padding: 12px 16px; border-radius: 8px;
      font-size: 12px; font-family: monospace; z-index: 1000;
    }
    #info-panel div { margin: 2px 0; }
  </style>
</head>
<body>
  <div id="status-bar">
    <div>
      <span class="dot dot-red" id="cam-dot"></span>
      <span id="cam-status">Camera: initializing...</span>
    </div>
    <div>
      <span id="cal-status">Calibration: 0/9</span>
    </div>
    <div>
      <span id="stream-status">Streaming: off</span>
    </div>
  </div>

  <div id="calibration-overlay">
    <h2>Gaze Calibration</h2>
    <p>Click each blue dot while looking at it. After all 9 points, gaze tracking begins automatically.</p>
  </div>

  <div id="gaze-dot"></div>

  <div id="info-panel">
    <div>Session: <span id="info-session">—</span></div>
    <div>Gaze: (<span id="info-x">—</span>, <span id="info-y">—</span>)</div>
    <div>Confidence: <span id="info-conf">—</span></div>
    <div>Samples: <span id="info-count">0</span></div>
  </div>

  <!-- WebGazer.js loaded from CDN -->
  <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
  <script>
    const CONFIG = {
      // Set via URL params: ?session_id=xxx&endpoint=http://localhost:8765
      sessionId: new URLSearchParams(location.search).get('session_id') || 'test-session',
      endpoint: new URLSearchParams(location.search).get('endpoint') || null,
      sampleInterval: 100,  // ms between gaze samples
      batchSize: 50,        // samples per batch upload
      calPoints: 9,
    };

    let calibrated = 0;
    let sampleCount = 0;
    let gazeBatch = [];
    let streaming = false;

    // --- Calibration ---

    function createCalibrationPoints() {
      const overlay = document.getElementById('calibration-overlay');
      const positions = [
        [10, 10], [50, 10], [90, 10],
        [10, 50], [50, 50], [90, 50],
        [10, 90], [50, 90], [90, 90],
      ];

      positions.forEach(([xPct, yPct], i) => {
        const point = document.createElement('div');
        point.className = 'cal-point';
        point.style.left = `${xPct}%`;
        point.style.top = `${yPct}%`;
        point.style.transform = 'translate(-50%, -50%)';
        point.dataset.index = i;

        point.addEventListener('click', () => {
          point.classList.add('done');
          calibrated++;
          document.getElementById('cal-status').textContent = `Calibration: ${calibrated}/${CONFIG.calPoints}`;

          if (calibrated >= CONFIG.calPoints) {
            overlay.style.display = 'none';
            startStreaming();
          }
        });

        overlay.appendChild(point);
      });
    }

    // --- Gaze streaming ---

    function startStreaming() {
      streaming = true;
      document.getElementById('stream-status').textContent = 'Streaming: active';
      document.getElementById('gaze-dot').style.display = 'block';

      webgazer.setGazeListener((data, timestamp) => {
        if (!data) return;

        sampleCount++;
        const sample = {
          timestamp: new Date().toISOString(),
          session_id: CONFIG.sessionId,
          gaze_x: Math.round(data.x),
          gaze_y: Math.round(data.y),
          gaze_confidence: null,  // WebGazer doesn't expose confidence per-sample
          scroll_y: 0,
          scroll_progress: 0,
        };

        // Update UI
        const dot = document.getElementById('gaze-dot');
        dot.style.left = data.x + 'px';
        dot.style.top = data.y + 'px';
        document.getElementById('info-x').textContent = Math.round(data.x);
        document.getElementById('info-y').textContent = Math.round(data.y);
        document.getElementById('info-count').textContent = sampleCount;

        // Batch for upload
        gazeBatch.push(sample);
        if (gazeBatch.length >= CONFIG.batchSize) {
          flushBatch();
        }
      });
    }

    async function flushBatch() {
      if (gazeBatch.length === 0) return;
      const batch = gazeBatch.splice(0);

      if (CONFIG.endpoint) {
        try {
          await fetch(CONFIG.endpoint + '/gaze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ samples: batch }),
          });
        } catch (e) {
          console.warn('[ContextNotes] Gaze upload failed:', e.message);
        }
      }

      // Also post to parent window if embedded
      if (window.opener) {
        window.opener.postMessage({ type: 'contextnotes-gaze', samples: batch }, '*');
      }
    }

    // --- Init ---

    async function init() {
      document.getElementById('info-session').textContent = CONFIG.sessionId.slice(0, 8);

      try {
        await webgazer
          .setRegression('ridge')
          .begin();

        document.getElementById('cam-dot').className = 'dot dot-green';
        document.getElementById('cam-status').textContent = 'Camera: active';

        // Hide the webgazer video preview (it's distracting)
        const video = document.getElementById('webgazerVideoFeed');
        if (video) video.style.display = 'none';
        const overlay = document.getElementById('webgazerFaceFeedbackBox');
        if (overlay) overlay.style.display = 'none';

        createCalibrationPoints();
      } catch (e) {
        document.getElementById('cam-dot').className = 'dot dot-red';
        document.getElementById('cam-status').textContent = `Camera: error — ${e.message}`;
      }
    }

    // Flush remaining samples on page unload
    window.addEventListener('beforeunload', () => {
      flushBatch();
      if (streaming) webgazer.end();
    });

    init();
  </script>
</body>
</html>
